<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Incremental Rush</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      border-radius: 0px !important; /* STRICT MINIMALIST BRUTALIST STYLE */
    }
    body {
      font-family: 'Space Mono', monospace;
      background-color: #030303;
      overflow: hidden;
      height: 100vh;
      height: 100dvh; /* Dynamic viewport heights for mobile screens */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    
    @keyframes scrollStripes {
      0% { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    .pattern-locked {
      background-color: #0b0b0c;
      background-image: linear-gradient(
        45deg, 
        #121214 25%, 
        transparent 25%, 
        transparent 50%, 
        #121214 50%, 
        #121214 75%, 
        transparent 75%, 
        transparent
      );
      background-size: 20px 20px;
      animation: scrollStripes 8s linear infinite;
    }

    .pattern-can-buy {
      background-color: #1e1b10;
      background-image: linear-gradient(
        45deg, 
        #2c2415 25%, 
        transparent 25%, 
        transparent 50%, 
        #2c2415 50%, 
        #2c2415 75%, 
        transparent 75%, 
        transparent
      );
      background-size: 20px 20px;
      animation: scrollStripes 4s linear infinite;
    }

    .pattern-bought {
      background-color: #061a12;
      background-image: linear-gradient(
        45deg, 
        #0a281c 25%, 
        transparent 25%, 
        transparent 50%, 
        #0a281c 50%, 
        #0a281c 75%, 
        transparent 75%, 
        transparent
      );
      background-size: 20px 20px;
      animation: scrollStripes 10s linear infinite;
    }

    .flash-active {
      animation: screenFlash 0.15s ease-out;
    }
    @keyframes screenFlash {
      0% { opacity: 0.6; background-color: rgba(16, 185, 129, 0.3); }
      100% { opacity: 0; background-color: transparent; }
    }

    #doodle-canvas {
      image-rendering: pixelated;
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #09090b;
    }
    ::-webkit-scrollbar-thumb {
      background: #27272a;
    }
  </style>
</head>
<body class="w-screen flex flex-col justify-between text-zinc-100 overflow-hidden select-none">

  <header class="w-full bg-black border-b border-zinc-800 p-3 flex justify-between items-center z-40 shrink-0">
    <div class="flex items-center space-x-3">
      <select id="stage-jumper" class="bg-zinc-900 border border-zinc-800 text-xs text-zinc-200 font-bold px-2 py-1 focus:outline-none cursor-pointer">
        <option value="1">STAGE 1: Beginning</option>
        <option value="2">STAGE 2: Timer</option>
        <option value="3">STAGE 3: Energy</option>
        <option value="4">STAGE 4: Tied Upgrades</option>
        <option value="5">STAGE 5: Overlapping Ties</option>
        <option value="6">STAGE 6: Inflating Upgrades</option>
        <option value="7">STAGE 7: The Convergence</option>
      </select>
      
      <!-- SPEED WARP CONTROLLER PANEL -->
      <div id="speed-controls" class="flex items-center space-x-1 border border-zinc-800 p-[2px] bg-zinc-950">
        <button id="speed-05" class="px-2 py-0.5 text-[10px] font-bold text-zinc-400 bg-transparent hover:text-white transition-colors">0.5x</button>
        <button id="speed-10" class="px-2 py-0.5 text-[10px] font-bold text-black bg-amber-500">1.0x</button>
        <button id="speed-20" class="px-2 py-0.5 text-[10px] font-bold text-zinc-400 bg-transparent hover:text-white transition-colors">2.0x</button>
      </div>
    </div>

    <div class="flex items-center space-x-2">
      <button id="reset-stage-btn" class="border border-zinc-800 hover:border-red-600 hover:text-red-400 text-xs font-bold px-3 py-1 bg-zinc-950 transition-all flex items-center space-x-1">
        <span>RESET STAGE</span>
      </button>
    </div>
  </header>

  <main id="viewport-container" class="relative flex-grow w-full bg-[#050505] overflow-hidden cursor-grab active:cursor-grabbing">
    
    <!-- INFINITE VIRTUAL GRID LAYER -->
    <div id="grid-wrapper" class="absolute origin-center select-none" style="width: 600px; height: 600px; left: 50%; top: 50%; margin-left: -300px; margin-top: -300px;">
      
      <!-- DYNAMIC GRID SQUARES -->
      <div id="squares-grid" class="absolute inset-[30px] grid grid-cols-4 grid-rows-4 gap-4 z-10 select-none">
        <!-- 16 custom card panels injected dynamically -->
      </div>

      <!-- SVG CAGES CONNECTION LAYER (Sits on top of upgrades grid for max visibility) -->
      <svg id="svg-cages-layer" class="absolute inset-0 w-full h-full pointer-events-none z-20" style="position: absolute; pointer-events: none;" xmlns="http://www.w3.org/2000/svg">
        <!-- Path borders and badges injected dynamically -->
      </svg>

      <!-- FREEFORM DRAWING STRATEGY OVERLAY -->
      <canvas id="doodle-canvas" width="600" height="600" class="absolute inset-0 pointer-events-none z-30"></canvas>
    </div>

    <!-- FLASH LAYER FEEDBACK -->
    <div id="flash-overlay" class="absolute inset-0 pointer-events-none z-30 transition-opacity opacity-0"></div>

    <!-- HUD TEXT OVERLAY (Hidden during Planning Mode) -->
    <div id="hud-stats-overlay" class="absolute bottom-5 left-5 z-40 pointer-events-none space-y-1">
      <div class="text-sm font-bold tracking-wider text-zinc-500" id="hud-status-mode">PLANNING MODE</div>
      <div class="text-xs sm:text-sm font-black text-white" id="hud-points-display">Points: 0 (+0.0/s)</div>
      <div class="text-xs text-zinc-400 hidden" id="hud-energy-display">Energy: 0 (+0.0/s) [Boost: x1.00]</div>
      <div class="text-sm text-red-500 font-bold hidden" id="hud-timer-display">Time remaining: 60.00s</div>
    </div>

    <!-- CAMERA ADJUSTMENT CONSOLE -->
    <div class="absolute bottom-5 right-5 z-40 flex space-x-1 bg-black/60 border border-zinc-800 p-1">
      <button id="zoom-in" class="w-8 h-8 flex items-center justify-center text-xs font-black text-zinc-400 hover:text-white border border-zinc-800 hover:bg-zinc-900" title="Zoom In">+</button>
      <button id="zoom-out" class="w-8 h-8 flex items-center justify-center text-xs font-black text-zinc-400 hover:text-white border border-zinc-800 hover:bg-zinc-900" title="Zoom Out">-</button>

  </main>

    </div>

        </svg>
      </button>

      <!-- Strategy Scribble Button -->

          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />

          <path d="M8 5v14l11-7z" />
        </svg>
      </button>
    </div>
  </footer>

  <!-- BRIEFING OVERLAYS -->

        <span class="text-xs font-bold text-amber-500 tracking-widest font-mono">Game Update</span>

    </div>
  </div>

  <div id="victory-overlay" class="fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center p-6 hidden">

      <h2 class="text-2xl font-black text-emerald-500 tracking-widest font-mono">Stage Clear!</h2>

      <button id="next-stage-btn" class="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-bold text-xs py-3 transition-all font-mono">
        Next Stage

    </div>
  </div>

    function initSynth() {
      if (audioCtx) return;
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContextClass();
      } catch (e) {
        console.error("Audio block security active", e);
      }
    }

    function playBeep(freq, type = 'sine', duration = 0.1, gainVal = 0.1) {
      initSynth();
      if (!audioCtx) return;
      try {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        gainNode.gain.setValueAtTime(gainVal, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }

    function playTimeAddChime() {
      playBeep(440, 'sine', 0.2, 0.08);
      setTimeout(() => playBeep(659.25, 'sine', 0.25, 0.08), 80);
      setTimeout(() => playBeep(880, 'sine', 0.4, 0.1), 160);

    function getRopeColor(mult) {
      if (mult === 2) return '#ef4444';      
      if (mult === 3) return '#f97316';      
      if (mult === 4) return '#eab308';      
      if (mult === 5) return '#22c55e';      
      if (mult === 6) return '#3b82f6';      
      if (mult === 7) return '#a855f7';      
      return '#ec4899';                     
    }

    function updateFrame() {
      gridWrapper.style.transform = `translate(${state.camX}px, ${state.camY}px) scale(${state.camZoom})`;
    }

    function autoScaleToFit() {
      const containerWidth = viewportContainer.clientWidth;
      const containerHeight = viewportContainer.clientHeight;
      if (!containerWidth || !containerHeight) return;

      const baseSize = 640; 
      const scaleX = containerWidth / baseSize;
      const scaleY = containerHeight / baseSize;
      
      let optimalZoom = Math.min(scaleX, scaleY);
      optimalZoom = Math.max(0.4, Math.min(optimalZoom, 1.2));
      
      state.camZoom = optimalZoom;
      state.camX = 0;
      state.camY = 0;
      updateFrame();
    }

    function recenterGrid() {
      autoScaleToFit();
    }

    function initializeDoodleCanvas() {
      ctx.clearRect(0, 0, doodleCanvas.width, doodleCanvas.height);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      
      savedDrawings.forEach(stroke => {
        if (stroke.points.length < 2) return;
        ctx.beginPath();
        ctx.strokeStyle = stroke.color;
        ctx.lineWidth = stroke.weight;
        ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
        for (let i = 1; i < stroke.points.length; i++) {
          ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
        }
        ctx.stroke();
      });
    }

    function getCanvasCoords(e) {
      const rect = doodleCanvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      
      const relativeX = clientX - rect.left;
      const relativeY = clientY - rect.top;
      
      const canvasX = (relativeX / rect.width) * doodleCanvas.width;
      const canvasY = (relativeY / rect.height) * doodleCanvas.height;
      
      return { x: canvasX, y: canvasY };
    }

    viewportContainer.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      
      if (state.drawMode === 'note' && state.planningMode) {
        isDrawingActive = true;
        const coords = getCanvasCoords(e);
        ctx.beginPath();
        ctx.strokeStyle = state.penColor;
        ctx.lineWidth = state.penWeight;
        ctx.moveTo(coords.x, coords.y);
        
        savedDrawings.push({
          color: state.penColor,
          weight: state.penWeight,
          points: [coords]
        });
      } else {
        state.isPanning = true;
        state.panStartX = e.clientX - state.camX;
        state.panStartY = e.clientY - state.camY;
      }
    });

    window.addEventListener('mousemove', (e) => {
      if (state.drawMode === 'note' && state.planningMode) {
        if (e.buttons !== 1 || !isDrawingActive) {
          isDrawingActive = false;
          return;
        }
        const coords = getCanvasCoords(e);
        ctx.lineTo(coords.x, coords.y);
        ctx.stroke();
        
        const lastDrawing = savedDrawings[savedDrawings.length - 1];
        if (lastDrawing) {
          lastDrawing.points.push(coords);
        }
      } else if (state.isPanning) {
        state.camX = e.clientX - state.panStartX;
        state.camY = e.clientY - state.panStartY;
        updateFrame();
      }
    });

    viewportContainer.addEventListener('mouseleave', () => {
      isDrawingActive = false;
      state.isPanning = false;
    });

    window.addEventListener('mouseup', () => {
      isDrawingActive = false;
      state.isPanning = false;
    });

    viewportContainer.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        if (state.drawMode === 'note' && state.planningMode) {
          isDrawingActive = true;
          const coords = getCanvasCoords(e);
          ctx.beginPath();
          ctx.strokeStyle = state.penColor;
          ctx.lineWidth = state.penWeight;
          ctx.moveTo(coords.x, coords.y);

            color: state.penColor,
            weight: state.penWeight,
            points: [coords]
          });
        } else {
          state.isPanning = true;
          state.panStartX = e.touches[0].clientX - state.camX;
          state.panStartY = e.touches[0].clientY - state.camY;
        }
      }
    }, { passive: true });

    window.addEventListener('touchmove', (e) => {
      if (e.touches.length === 1) {
        if (isDrawingActive && state.planningMode) {
          const coords = getCanvasCoords(e);
          ctx.lineTo(coords.x, coords.y);

          const lastDrawing = savedDrawings[savedDrawings.length - 1];
          if (lastDrawing) {
            lastDrawing.points.push(coords);
          }
        } else if (state.isPanning) {
          state.camX = e.touches[0].clientX - state.panStartX;
          state.camY = e.touches[0].clientY - state.panStartY;
          updateFrame();
        }
      }
    }, { passive: true });

    window.addEventListener('touchend', () => {
      isDrawingActive = false;
      state.isPanning = false;
    });

    window.addEventListener('touchcancel', () => {
      isDrawingActive = false;
      state.isPanning = false;
    });

    viewportContainer.addEventListener('wheel', (e) => {
      e.preventDefault();
      const zoomFactor = 1.1;
      if (e.deltaY < 0) {
        state.camZoom = Math.min(state.camZoom * zoomFactor, 3.0);
      } else {
        state.camZoom = Math.max(state.camZoom / zoomFactor, 0.4);
      }
      updateFrame();
    }, { passive: false });

    document.getElementById('zoom-in').addEventListener('click', () => {
      state.camZoom = Math.min(state.camZoom * 1.2, 3.0);

      });

      if (state.activeStage === 2) {
        const u14 = state.upgrades.find(u => u.id === 14);
        if (u14 && u14.bought) {
          const selfMultiplier = Math.pow((state.points / 25) + 1, 0.2);
          mult *= selfMultiplier;
        }
      }

      if (state.activeStage >= 3) {
        const energyBoost = Math.pow(state.energy + 1, 0.2);
        mult *= energyBoost;
      }

      return { base, mult, total: base * mult };
    }

    function getEnergyBreakdown() {
      if (state.activeStage < 3) return { base: 0, mult: 0, total: 0 };
      let base = 0;

      state.upgrades.forEach(u => {
        if (u.bought && u.addEnergy) base += u.addEnergy;
      });

      let mult = 1;
      state.upgrades.forEach(u => {
        if (u.bought && u.multEnergy !== undefined) mult *= u.multEnergy;
      });

      return { base, mult, total: base * mult };
    }

    function renderCages() {
      svgCagesLayer.innerHTML = "";

      requestAnimationFrame(() => {
        const wrapperRect = gridWrapper.getBoundingClientRect();
        if (wrapperRect.width === 0) return;

        const scale = 600 / wrapperRect.width;

        state.ropes.forEach((rope, index) => {
          let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
          let validCards = 0;

          rope.ids.forEach(id => {
            const card = document.querySelector(`[data-upgrade-id="${id}"]`);
            if (!card) return;
            const cardRect = card.getBoundingClientRect();
            
            const l = (cardRect.left - wrapperRect.left) * scale;
            const t = (cardRect.top - wrapperRect.top) * scale;
            const r = (cardRect.right - wrapperRect.left) * scale;
            const b = (cardRect.bottom - wrapperRect.top) * scale;

            if (l < minX) minX = l;
            if (t < minY) minY = t;
            if (r > maxX) maxX = r;
            if (b > maxY) maxY = b;
            validCards++;
          });

          if (validCards === 0) return;

          const pathColor = getRopeColor(rope.multiplier);
          const padding = 5;
          
          const rectCage = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          rectCage.setAttribute("x", minX - padding);
          rectCage.setAttribute("y", minY - padding);
          rectCage.setAttribute("width", (maxX - minX) + (padding * 2));
          rectCage.setAttribute("height", (maxY - minY) + (padding * 2));
          rectCage.setAttribute("stroke", pathColor);
          rectCage.setAttribute("stroke-width", "2");
          rectCage.setAttribute("stroke-dasharray", "5,5");
          rectCage.setAttribute("fill", "none");
          rectCage.setAttribute("opacity", "0.95");
          svgCagesLayer.appendChild(rectCage);

          const textWidth = rope.multiplier >= 10 ? 28 : 20;
          const bgRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          bgRect.setAttribute("x", minX - padding + 2);
          bgRect.setAttribute("y", maxY + padding - 18);
          bgRect.setAttribute("width", textWidth);
          bgRect.setAttribute("height", 14);
          bgRect.setAttribute("fill", "#030303");
          bgRect.setAttribute("stroke", pathColor);
          bgRect.setAttribute("stroke-width", "1");
          bgRect.setAttribute("opacity", "1");
          svgCagesLayer.appendChild(bgRect);

          const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
          text.setAttribute("x", minX - padding + 4);
          text.setAttribute("y", maxY + padding - 7);
          text.setAttribute("fill", pathColor);
          text.setAttribute("font-family", "'Space Mono', monospace");
          text.setAttribute("font-size", "10");
          text.setAttribute("font-weight", "bold");
          text.textContent = `x${rope.multiplier}`;
          svgCagesLayer.appendChild(text);
        });
      });
    }

    function renderGrid() {
      squaresGrid.innerHTML = "";
      
      state.upgrades.forEach(u => {
        const card = document.createElement('div');
        card.setAttribute('data-upgrade-id', u.id);
        
        card.className = "upgrade-card relative border p-2 flex flex-col justify-between transition-all duration-100 select-none cursor-pointer transform hover:scale-[1.03] hover:border-white active:scale-[0.97] z-10";

        card.innerHTML = `
          <div class="progress-bar absolute bottom-0 left-0 w-full bg-amber-500/10 pointer-events-none transition-all duration-100" style="height: 0%;"></div>
          <!-- QoL Sequence Overlay Number -->
          <div class="seq-num absolute inset-0 flex items-center justify-center text-zinc-500/20 text-5xl font-black font-mono select-none pointer-events-none hidden"></div>
          
          <div class="relative z-10 flex justify-between items-start">
            <span class="card-id text-[10px] font-bold">#${u.id < 10 ? '0' + u.id : u.id}</span>
          </div>
          <p class="card-desc relative z-10 text-[9px] leading-tight font-bold my-1 text-left"></p>
          <div class="relative z-10 text-right">
            <span class="card-cost text-xs font-black tracking-wide"></span>
          </div>
        `;

        card.addEventListener('click', () => {
          if (state.planningMode) {
            // Trigger customized sequence adder
            if (state.drawMode === 'sequence') {
              addToSequence(u.id);
            }
            return; 
          }
          buyUpgrade(u.id);
        });

        squaresGrid.appendChild(card);
      });

      // Execute immediate interface updates
      updateGridUI();
    }

    function addToSequence(id) {
      if (!state.sequence.includes(id) && state.sequence.length < 16) {
        state.sequence.push(id);
        playBeep(600, 'sine', 0.08, 0.05);
        updateGridUI();
      }
    }

    function undoSequenceStep() {
      if (state.sequence.length > 0) {
        state.sequence.pop();
        playBeep(300, 'sine', 0.08, 0.05);
        updateGridUI();
      }
    }

    function clearSequence() {
      state.sequence = [];
      playBeep(200, 'sine', 0.15, 0.05);
      updateGridUI();
    }

    function undoDoodleStroke() {
      if (savedDrawings.length > 0) {
        savedDrawings.pop();
        initializeDoodleCanvas();
        playBeep(300, 'sine', 0.08, 0.05);
      }
    }

    function updateGridUI() {
      state.upgrades.forEach(u => {
        const card = squaresGrid.querySelector(`[data-upgrade-id="${u.id}"]`);
        if (!card) return;

        const isAffordable = state.points >= u.currentCost && !u.bought;
        let bgStyleClass = "pattern-locked border-zinc-800 text-zinc-400";
        let textStyleClass = "text-zinc-400";

        if (u.bought) {
          bgStyleClass = "pattern-bought border-emerald-500 text-emerald-400";
          textStyleClass = "text-emerald-400";
        } else if (isAffordable) {
          bgStyleClass = "pattern-can-buy border-amber-500 text-amber-400";
          textStyleClass = "text-amber-400 font-bold";
        }

        card.className = `upgrade-card relative border p-2 flex flex-col justify-between transition-all duration-100 select-none cursor-pointer transform hover:scale-[1.03] hover:border-white active:scale-[0.97] z-10 ${bgStyleClass}`;

        if (u.inflationRate !== 1.0 && !u.bought) {
          card.classList.add('animate-pulse');
          if (u.inflationRate > 1.0) {
            card.style.borderColor = '#ef4444'; 
          } else {
            card.style.borderColor = '#3b82f6'; 
          }
        } else {
          card.style.borderColor = '';
        }

        // Adjust interactive progress bar height
        const progress = card.querySelector('.progress-bar');
        if (progress) {
          if (!u.bought && u.currentCost > 0) {
            const percent = Math.min(100, (state.points / u.currentCost) * 100);
            progress.style.height = `${percent}%`;
            progress.style.display = 'block';
          } else {
            progress.style.height = '0%';
            progress.style.display = 'none';
          }
        }

        // Update semi-transparent purchase order number
        const seqNumEl = card.querySelector('.seq-num');
        if (seqNumEl) {
          const seqIndex = state.sequence.indexOf(u.id);
          if (state.planningMode && seqIndex !== -1) {
            seqNumEl.textContent = seqIndex + 1;
            seqNumEl.classList.remove('hidden');
          } else {
            seqNumEl.classList.add('hidden');
          }
        }

        let displayCost = u.currentCost === 0 ? "FREE" : `${Math.round(u.currentCost)}pts`;
        let displayDesc = u.desc;

        if (state.activeStage === 2 && u.id === 14) {
          const curBoost = Math.pow((state.points / 25) + 1, 0.2);
          displayDesc = `Points boost itself at a rate of (pts/25+1)^0.2, currently x${curBoost.toFixed(2)}. 300pts.`;
        }

        const descEl = card.querySelector('.card-desc');
        if (descEl) {
          descEl.textContent = displayDesc;
          descEl.className = `card-desc relative z-10 text-[9px] leading-tight font-bold my-1 text-left ${textStyleClass}`;
        }

        const costEl = card.querySelector('.card-cost');
        if (costEl) {
          costEl.textContent = displayCost;
          costEl.className = `card-cost text-xs font-black tracking-wide ${textStyleClass}`;
        }

        const idEl = card.querySelector('.card-id');
        if (idEl) {
          idEl.className = `card-id text-[10px] font-bold ${textStyleClass}`;
        }
      });
    }

    function buyUpgrade(id) {
      const u = state.upgrades.find(item => item.id === id);
      if (!u || u.bought) return;

      if (state.points >= u.currentCost) {
        state.points -= u.currentCost;
        u.bought = true;

        if (u.addTime) {
          state.timer += u.addTime;
          playTimeAddChime();
        } else {
          playBeep(440, 'triangle', 0.12, 0.08);
        }

        flashOverlay.className = "absolute inset-0 pointer-events-none z-30 bg-emerald-500/10 flash-active";
        setTimeout(() => {
          flashOverlay.className = "absolute inset-0 pointer-events-none z-30 opacity-0";
        }, 150);

        state.ropes.forEach(rope => {
          if (rope.ids.includes(u.id)) {
            rope.ids.forEach(partnerId => {
              if (partnerId === u.id) return;
              const partnerUpg = state.upgrades.find(item => item.id === partnerId);
              if (partnerUpg && !partnerUpg.bought) {
                partnerUpg.currentCost *= rope.multiplier;
              }
            });
          }
        });

        updateGridUI();
        renderCages();
        checkWinCondition();
      } else {
        playBeep(150, 'square', 0.15, 0.05);
      }
    }

    function checkWinCondition() {
      const allBought = state.upgrades.every(u => u.bought);
      if (allBought) {
        state.timerActive = false;
        playBeep(880, 'sine', 0.4, 0.1);
        
        const cards = document.querySelectorAll('#squares-grid > div');
        cards.forEach((card, idx) => {
          card.style.transition = `all 0.5s cubic-bezier(0.4, 0, 0.2, 1) ${idx * 40}ms`;
          card.style.transform = 'translateY(800px) rotate(15deg)';
          card.style.opacity = '0';
        });

        setTimeout(() => {
          const messages = {
            1: "All upgrades bought, level clear!",
            2: "All upgrades bought again, you're doing great!",
            3: "All upgrades bought, good luck on the next stages!",
            4: "All upgrades bought, congratulations on winning the chained upgrades!",
            5: "All upgrades bought. Wow, you've defeated overlapping cages, you're doing amazing!",
            6: "All upgrades bought. Good luck for the final puzzle.",
            7: "GG! You win! Thanks for playing the Convergence!"
          };
          victoryMessage.textContent = messages[state.activeStage] || "Simulation configured perfectly.";
          victoryOverlay.classList.remove('hidden');
        }, 1000);
      }
    }

    nextStageBtn.addEventListener('click', () => {
      victoryOverlay.classList.add('hidden');
      if (state.activeStage < 7) {
        const next = state.activeStage + 1;
        state.unlockedStageMax = Math.max(state.unlockedStageMax, next);
        loadStage(next);
      } else {
        loadStage(1);
      }
    });

    let lastTime = performance.now();
    
    function gameLoop(now) {
      const dt = (now - lastTime) / 1000;
      lastTime = now;

      const adjustedDt = dt * state.gameSpeed;

      if (!state.planningMode) {
        const pointBreakdown = getPointsBreakdown();
        const energyBreakdown = getEnergyBreakdown();

        state.points += pointBreakdown.total * adjustedDt;
        state.energy += energyBreakdown.total * adjustedDt;

        const config = STAGE_CONFIGS[state.activeStage];
        if (config.hasTimer && state.timerActive) {
          state.timer -= adjustedDt;
          if (state.timer <= 0) {
            state.timer = 0;
            state.timerActive = false;
            
            playBeep(100, 'sawtooth', 0.8, 0.15);
            enterPlanningMode();
          }

          const currentSecond = Math.ceil(state.timer);
          if (state.timer <= 10 && currentSecond !== lastSecondTick) {
            playWarningTick();
            lastSecondTick = currentSecond;
          }
        }

        // Apply inflation/deflation changes over active seconds
        state.upgrades.forEach(u => {
          if (!u.bought && u.inflationRate !== 1.0) {
            u.currentCost *= Math.pow(u.inflationRate, adjustedDt);
          }
        });

        // EXECUTE AUTO SEQUENCE BUYER (Buy step by step per tick based on state.sequence queue)
        if (state.sequence.length > 0) {
          let sequenceActive = true;
          while (sequenceActive && state.sequenceIndex < state.sequence.length) {
            const nextTargetId = state.sequence[state.sequenceIndex];
            const targetUpg = state.upgrades.find(u => u.id === nextTargetId);
            if (targetUpg) {
              if (targetUpg.bought) {
                // If already purchased, skip to next target
                state.sequenceIndex++;
              } else if (state.points >= targetUpg.currentCost) {
                // Affordable! Execute automated buy
                buyUpgrade(nextTargetId);
                state.sequenceIndex++;
              } else {
                // Cannot afford this step yet, stop sequence progression for this tick
                sequenceActive = false;
              }
            } else {
              state.sequenceIndex++;
            }
          }
        }

        updateGridUI();
        updateHUD();
      }

      requestAnimationFrame(gameLoop);
    }

    function updateHUD() {
      if (state.planningMode) {
        hudStatusMode.textContent = "PLANNING MODE";
        hudPointsDisplay.classList.add('hidden');
        hudEnergyDisplay.classList.add('hidden');
        hudTimerDisplay.classList.add('hidden');
        return;
      }

      hudStatusMode.textContent = "ACTIVE RUN";
      hudPointsDisplay.classList.remove('hidden');

      const ptBreak = getPointsBreakdown();
      hudPointsDisplay.textContent = `Points: ${Math.round(state.points)} (+${ptBreak.total.toFixed(1)}/s: ${ptBreak.base.toFixed(1)}/s Base, ${ptBreak.mult.toFixed(2)}x Mult)`;

      if (state.activeStage >= 3) {
        hudEnergyDisplay.classList.remove('hidden');
        const enBreak = getEnergyBreakdown();
        const energyBoost = Math.pow(state.energy + 1, 0.2);
        hudEnergyDisplay.textContent = `Energy: ${Math.round(state.energy)} (+${enBreak.total.toFixed(1)}/s: ${enBreak.base.toFixed(1)}/s Base, ${enBreak.mult.toFixed(2)}x Mult) [Boost: x${energyBoost.toFixed(2)}]`;
      } else {
        hudEnergyDisplay.classList.add('hidden');
      }

      const config = STAGE_CONFIGS[state.activeStage];
      if (config.hasTimer) {
        hudTimerDisplay.classList.remove('hidden');
        hudTimerDisplay.textContent = `Time remaining: ${Math.max(0, state.timer).toFixed(2)}s`;
      } else {
        hudTimerDisplay.classList.add('hidden');
      }
    }

    function switchToolMode(mode) {
      state.drawMode = mode;
      
      // Default: lock standard interactions to allow whiteboard canvas touch
      squaresGrid.style.pointerEvents = 'none';
      
      // Hide all contextual menus
      penSubmenu.classList.add('hidden');
      sequenceSubmenu.classList.add('hidden');

      // Clear highlighted button rings
      toolDrag.className = "w-12 h-12 bg-zinc-950 border border-zinc-800 text-zinc-400 flex items-center justify-center hover:bg-zinc-900 hover:text-white transition-all shadow";
      toolNote.className = "w-12 h-12 bg-zinc-950 border border-zinc-800 text-zinc-400 flex items-center justify-center hover:bg-zinc-900 hover:text-white transition-all shadow";
      toolSequence.className = "w-12 h-12 bg-zinc-950 border border-zinc-800 text-zinc-400 flex items-center justify-center hover:bg-zinc-900 hover:text-white transition-all shadow";

      if (mode === 'drag') {
        toolDrag.className = "w-12 h-12 bg-zinc-900 border-2 border-amber-500 text-amber-500 flex items-center justify-center hover:bg-zinc-800 transition-all shadow";
      } else if (mode === 'note') {
        toolNote.className = "w-12 h-12 bg-zinc-900 border-2 border-amber-500 text-amber-500 flex items-center justify-center hover:bg-zinc-800 transition-all shadow";
        if (state.planningMode) {
          penSubmenu.classList.remove('hidden');
        }
      } else if (mode === 'sequence') {
        toolSequence.className = "w-12 h-12 bg-zinc-900 border-2 border-amber-500 text-amber-500 flex items-center justify-center hover:bg-zinc-800 transition-all shadow";
        if (state.planningMode) {
          // Unlock card panels click events
          squaresGrid.style.pointerEvents = 'auto';
          sequenceSubmenu.classList.remove('hidden');
        }
      }

      updateGridUI();
    }

    // Tool click bindings
    toolDrag.addEventListener('click', () => switchToolMode('drag'));
    toolNote.addEventListener('click', () => switchToolMode('note'));
    toolSequence.addEventListener('click', () => switchToolMode('sequence'));

    toolClear.addEventListener('click', () => {
      savedDrawings = [];
      initializeDoodleCanvas();
      playBeep(220, 'sine', 0.1, 0.05);
    });

    // Submenu Buttons Listeners
    document.getElementById('seq-undo').addEventListener('click', undoSequenceStep);
    document.getElementById('seq-clear').addEventListener('click', clearSequence);
    document.getElementById('doodle-undo').addEventListener('click', undoDoodleStroke);

    executeRunBtn.addEventListener('click', () => {
      // Easing implementation: Slide toolbar downwards gracefully on Stage 2+
      if (state.activeStage >= 2) {
        planningToolbar.classList.add('translate-y-full', 'opacity-0');
        setTimeout(() => {
          planningToolbar.classList.add('hidden');
          recenterGrid();
        }, 500);
      } else {
        planningToolbar.classList.add('hidden');
      }

      state.planningMode = false;
      state.timerActive = true;
      state.points = 0;
      state.energy = 0;
      state.timer = 60.0;
      lastSecondTick = 60;
      state.sequenceIndex = 0;

      // Close submenus and unlock panels pointer bounds
      penSubmenu.classList.add('hidden');
      sequenceSubmenu.classList.add('hidden');
      squaresGrid.style.pointerEvents = 'auto'; 

      const config = STAGE_CONFIGS[state.activeStage];
      state.upgrades = config.upgrades.map(upg => ({
        ...upg,
        currentCost: upg.baseCost,
        bought: false,
        inflationRate: upg.inflationRate || 1.0
      }));

      // AUTO-BUY UPGRADE #1 ON STAGE 2+ (Free upgrade #1 purchased instantly)
      if (state.activeStage >= 2) {
        const freeUpg = state.upgrades.find(u => u.id === 1);
        if (freeUpg) {
          freeUpg.bought = true;
          // Trigger partner cost multiplications if applicable
          state.ropes.forEach(rope => {
            if (rope.ids.includes(freeUpg.id)) {
              rope.ids.forEach(partnerId => {
                if (partnerId === freeUpg.id) return;
                const partnerUpg = state.upgrades.find(item => item.id === partnerId);
                if (partnerUpg && !partnerUpg.bought) {
                  partnerUpg.currentCost *= rope.multiplier;
                }
              });
            }
          });
          // Play quick startup confirmation chime
          playBeep(523.25, 'triangle', 0.1, 0.05);
        }
      } else {
        playBeep(600, 'sine', 0.25, 0.08);
      }

      renderGrid();
      renderCages();
      recenterGrid();
      updateHUD();
    });

    resetStageBtn.addEventListener('click', () => {
      if (state.activeStage === 1) {
        loadStage(1);
      } else {
        enterPlanningMode();
      }
      playBeep(330, 'triangle', 0.15, 0.05);
    });

    const speedButtons = {
      'speed-05': 0.5,
      'speed-10': 1.0,
      'speed-20': 2.0
    };
    Object.keys(speedButtons).forEach(id => {
      document.getElementById(id).addEventListener('click', () => {
        if (state.activeStage === 1) return;

        state.gameSpeed = speedButtons[id];
        updateSpeedHighlights();
        playBeep(400 + state.gameSpeed * 100, 'sine', 0.08, 0.05);
      });
    });

    const weightButtons = {
      'weight-thin': 2,
      'weight-medium': 4,
      'weight-thick': 8
    };
    Object.keys(weightButtons).forEach(id => {
      document.getElementById(id).addEventListener('click', () => {
        state.penWeight = weightButtons[id];
        Object.keys(weightButtons).forEach(btnId => {
          document.getElementById(btnId).className = "w-5 h-5 flex items-center justify-center text-[9px] font-bold border border-zinc-700 bg-transparent text-zinc-500";
        });
        document.getElementById(id).className = "w-5 h-5 flex items-center justify-center text-[9px] font-bold border border-zinc-700 bg-zinc-900 text-zinc-300";
      });
    });

    const colorButtons = document.querySelectorAll('[data-color]');
    colorButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        state.penColor = btn.getAttribute('data-color');
        colorButtons.forEach(b => b.classList.add('border-transparent'));
        colorButtons.forEach(b => b.classList.remove('border-white'));
        btn.classList.add('border-white');
        btn.classList.remove('border-transparent');
      });
    });

    stageJumper.addEventListener('change', () => {
      const selectedStage = parseInt(stageJumper.value);
      loadStage(selectedStage);
    });

    window.onload = function () {
      loadStage(1);
      requestAnimationFrame(gameLoop);
    };

    window.addEventListener('resize', () => {
      autoScaleToFit();
      renderCages();
    });
  </script>
</body>
</html>
